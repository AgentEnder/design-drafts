<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" role="img"><title>Turnbuckle</title>
<!-- underfoot mat: soft floor plane receding to the corner base -->
<polygon points="26,45 38,45 61,61 3,61" fill="#2B2D42" fill-opacity="0.16"/>
<!-- back post -->
<rect x="28" y="6" width="8" height="40" rx="4" fill="#2B2D42"/>
<!-- ropes: pinned to each pad centre, moderated fan (receding, not splayed) -->
<g fill="none" stroke="#2B2D42" stroke-width="4.5" stroke-linecap="round">
  <path d="M22 14 L3 12"/><path d="M22 24 L3 26"/><path d="M22 34 L3 42"/>
  <path d="M42 14 L61 12"/><path d="M42 24 L61 26"/><path d="M42 34 L61 42"/>
</g>
<!-- pads facing viewer -->
<g fill="#C8102E"><rect x="22" y="10" width="20" height="8" rx="4"/><rect x="22" y="20" width="20" height="8" rx="4"/><rect x="22" y="30" width="20" height="8" rx="4"/></g>
</svg>
