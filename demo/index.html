<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Demo · Calm · Photo</title>
    <style>
      :root { color-scheme: light; }
      * { box-sizing: border-box; }
      body {
        margin: 0;
        min-height: 100vh;
        font: 17px/1.6 -apple-system, BlinkMacSystemFont, "Segoe UI", system-ui, sans-serif;
        color: #2b2b30;
        background: linear-gradient(160deg, #f4f1ec 0%, #e9e4db 100%);
      }
      .coord {
        position: fixed; top: 12px; left: 12px;
        font: 12px ui-monospace, monospace; color: #8a8378;
        background: rgba(255,255,255,0.6); padding: 4px 8px; border-radius: 6px;
      }
      main { max-width: 880px; margin: 0 auto; padding: 18vh 24px 24vh; }
      .eyebrow { letter-spacing: 0.18em; text-transform: uppercase; font-size: 12px; color: #b08968; margin: 0 0 18px; }
      h1 { font-size: clamp(2.4rem, 6vw, 4rem); line-height: 1.04; margin: 0 0 24px; font-weight: 600; letter-spacing: -0.02em; }
      p.lead { font-size: 1.2rem; max-width: 52ch; color: #4a463f; }
      .cta { display: inline-block; margin-top: 28px; padding: 12px 22px; border-radius: 999px; background: #2b2b30; color: #fff; text-decoration: none; }
    </style>
  </head>
  <body>
    <div class="coord">theme: calm &nbsp;·&nbsp; media: photo</div>
    <main data-annotate-id="hero">
      <p class="eyebrow" data-annotate-id="eyebrow">Calm · Photo</p>
      <h1 data-annotate-id="headline">Soft light, plenty of room to breathe.</h1>
      <p class="lead" data-annotate-id="lead">
        The calm theme leans on neutral tones and generous whitespace. Flip the
        <strong>Theme</strong> axis in the toolbar to see Bold and Editorial, or
        flip <strong>Media</strong> to Illustration.
      </p>
      <a class="cta" href="#" data-annotate-id="cta">Get started</a>
    </main>

    <script src="./node_modules/@design-drafts/toolbar/dist/toolbar.js" defer></script>
    <script src="./node_modules/@design-drafts/annotate/dist/annotate.js" defer></script>
  </body>
</html>
